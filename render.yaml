services:
  # Backend API
  - type: web
    name: bharat-traders-api
    runtime: python
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ping
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false # Get this from Supabase Connection String
      - key: REDIS_URL
        fromService:
          name: bharat-traders-cache
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://bharat-traders-five.vercel.app
      - key: GOOGLE_OAUTH_REDIRECT_URL
        value: https://bharat-traders-five.vercel.app/oauth-callback
      - key: FYERS_REDIRECT_URI
        value: https://bharat-traders-api.onrender.com/api/v1/fyers/callback
      # Fields to fill in the dashboard:
      - key: FYERS_CLIENT_ID
        sync: false
      - key: FYERS_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  # Redis (Key-Value)
  - type: keyvalue
    name: bharat-traders-cache
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: all
